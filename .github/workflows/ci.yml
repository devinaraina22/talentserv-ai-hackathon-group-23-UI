name: CI

on:
  push:
    branches: [main, master, cursor/medibook-hackathon-mvp]
  pull_request:
    branches: [main, master]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder_key_012345678901234567890
          CLERK_SECRET_KEY: sk_test_ci_placeholder_key_012345678901234567890
          NEXT_PUBLIC_API_URL: http://localhost:3001
          API_URL: http://localhost:3001

  e2e:
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Build for e2e
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder_key_012345678901234567890
          CLERK_SECRET_KEY: sk_test_ci_placeholder_key_012345678901234567890
          NEXT_PUBLIC_API_URL: http://localhost:3001
          API_URL: http://localhost:3001

      - run: npm run test:e2e
        env:
          CI: true
          E2E_TEST_MODE: "true"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder_key_012345678901234567890
          CLERK_SECRET_KEY: sk_test_ci_placeholder_key_012345678901234567890
          NEXT_PUBLIC_API_URL: http://localhost:3001
          API_URL: http://localhost:3001
