name: CI

on:
  push:
    branches: [main, master, cursor/medibook-hackathon-mvp]
  pull_request:
    branches: [main, master]

env:
  CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder_key_012345678901234567890
  CLERK_SECRET_KEY: sk_test_ci_placeholder_key_012345678901234567890
  API_URL: http://localhost:3001
  NEXT_PUBLIC_API_URL: http://localhost:3001

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ env.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ env.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          API_URL: ${{ env.API_URL }}

  e2e:
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4

      - name: Checkout backend (api-only)
        uses: actions/checkout@v4
        with:
          repository: devinaraina22/talentserv-ai-hackathon-group-23-backend
          ref: api-only
          path: backend

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend for e2e
        working-directory: backend
        run: npm run build
        env:
          E2E_TEST_MODE: "true"
          NODE_ENV: production
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ env.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ env.CLERK_SECRET_KEY }}

      - name: Seed backend data
        working-directory: backend
        run: npm run db:seed
        env:
          E2E_TEST_MODE: "true"
          NODE_ENV: test

      - name: Build frontend for e2e
        run: npm run build
        env:
          CI: true
          E2E_TEST_MODE: "true"
          NEXT_PUBLIC_E2E_TEST_MODE: "true"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ env.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ env.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          API_URL: ${{ env.API_URL }}

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          CI: true
          BACKEND_DIR: backend
          E2E_TEST_MODE: "true"
          NEXT_PUBLIC_E2E_TEST_MODE: "true"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ env.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ env.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          API_URL: ${{ env.API_URL }}
          FRONTEND_URL: http://localhost:3000
